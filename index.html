                text: "「これはさすがにやめとこう」とブレーキを踏んだ経験は？",
                options: [

                    { text: "数回ある", points: 4 },
                    { text: "何度もある", points: 8 },
                    { text: "日常的にセルフ検閲している", points: 11 }
                ]
            },
            {
                category: "selfcontrol",
                text: "「理性」と「本能」を天秤にかけたときの感覚は？",
                options: [
                    { text: "理性が完全勝利", points: 1 },
                    { text: "基本は理性寄り", points: 3 },
                    { text: "五分五分", points: 7 },
                    { text: "理性が必死に本能の手綱を握っている", points: 12 }
                ]
            },
            {
                category: "selfcontrol",
                text: "深夜に一人でいる時の行動は？",
                options: [
                    { text: "読書や映画鑑賞", points: 2 },
                    { text: "ゲームやSNS", points: 4 },
                    { text: "趣味の作業に没頭", points: 6 },
                    { text: "……朝になって後悔する系", points: 10 }
                ]
            },
            {
                category: "selfcontrol",
                text: "あなたが死ぬ時、HDD（ストレージ）の処理は？",
                options: [
                    { text: "家族に譲る", points: 1 },
                    { text: "そのまま廃棄", points: 3 },
                    { text: "初期化してから捨てる", points: 6 },
                    { text: "物理的にドリルで破壊し、この世から消滅させる", points: 10 }
                ]
            },
            {
                category: "selfcontrol",
                text: "「これ、人に知られたらちょっと照れるな」という趣味は？",
                options: [
                    { text: "特にない", points: 1 },
                    { text: "少しはある", points: 4 },
                    { text: "かなりある", points: 8 },
                    { text: "それがアイデンティティになりつつある", points: 12 }
                ]
            },
            {
                category: "selfcontrol",
                text: "最後に問います。あなたは「紳士」ですか？",
                options: [
                    { text: "いいえ、普通の人です", points: 2 },
                    { text: "そうありたいと思います", points: 5 },
                    { text: "時と場合によります", points: 8 },
                    { text: "はい。ただし「変態」という名の紳士です", points: 12 }
                ]
            }
        ];

        let currentQuestion = 0;
        let answers = [];
        let totalScore = 0;

        function confirmAge(isAdult) {
            if (isAdult) {
                document.getElementById('ageModal').style.display = 'none';
                showQuestion();
            } else {
                alert('申し訳ございません。18歳未満の方はご利用いただけません。');
                window.location.href = 'https://www.google.com';
            }
        }

        function showQuestion() {
            if (currentQuestion >= questions.length) {
                return;
            }

            const question = questions[currentQuestion];
            const container = document.getElementById('questionContainer');
            
            container.innerHTML = `
                <div class="question-container">
                    <div class="question-number">質問 ${currentQuestion + 1} / ${questions.length}</div>
                    <div class="question-text">${question.text}</div>
                    <div class="options">
                        ${question.options.map((option, index) => `
                            <div class="option" onclick="selectOption(${index})">
                                ${option.text}
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;

            updateProgress();
            document.getElementById('nextBtn').disabled = true;
            
            if (currentQuestion === questions.length - 1) {
                document.getElementById('nextBtn').style.display = 'none';
                document.getElementById('submitBtn').style.display = 'block';
            }
        }

        function selectOption(optionIndex) {
            const options = document.querySelectorAll('.option');
            options.forEach(opt => opt.classList.remove('selected'));
            options[optionIndex].classList.add('selected');
            
            answers[currentQuestion] = questions[currentQuestion].options[optionIndex].points;
            
            document.getElementById('nextBtn').disabled = false;
            document.getElementById('submitBtn').disabled = false;
        }

        function nextQuestion() {
            if (answers[currentQuestion] === undefined) {
                alert('選択肢を選んでください');
                return;
            }
            
            currentQuestion++;
            showQuestion();
        }

        function updateProgress() {
            const progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
            document.getElementById('progressText').textContent = `${currentQuestion + 1}/${questions.length}`;
        }

        function calculateResult() {
            if (answers[currentQuestion] === undefined) {
                alert('選択肢を選んでください');
                return;
            }

            // カテゴリー別スコア計算
            let observationScore = 0;
            let imaginationScore = 0;
            let researchScore = 0;
            let selfcontrolScore = 0;

            questions.forEach((q, index) => {
                const score = answers[index] || 0;
                switch(q.category) {
                    case 'observation':
                        observationScore += score;
                        break;
                    case 'imagination':
                        imaginationScore += score;
                        break;
                    case 'research':
                        researchScore += score;
                        break;
                    case 'selfcontrol':
                        selfcontrolScore += score;
                        break;
                }
            });

            // 重み付け計算（Model 1の安定したロジックを採用）
            const rawScore = 
                observationScore * 0.30 +
                imaginationScore * 0.35 +
                researchScore * 0.25 +
                selfcontrolScore * 0.10;

            // 0-500の範囲に正規化
            totalScore = Math.round(rawScore * 1.5);
            totalScore = Math.min(500, Math.max(0, totalScore));

            displayResult();
        }

        function displayResult() {
            document.getElementById('quiz').style.display = 'none';
            document.getElementById('result').style.display = 'block';

            // カウントアップアニメーション
            let currentScore = 0;
            const increment = Math.ceil(totalScore / 50);
            const scoreDisplay = document.getElementById('scoreDisplay');
            
            const counter = setInterval(() => {
                currentScore += increment;
                if (currentScore >= totalScore) {
                    currentScore = totalScore;
                    clearInterval(counter);
                }
                scoreDisplay.textContent = currentScore;
            }, 30);

            // ランク判定
            let rank, description, shareText;
            
            if (totalScore <= 80) {
                rank = '純朴青年';
                description = 'あなたは驚くほど健全な心の持ち主です。この清らかさは現代社会では希少価値があります。ただ、人生にもう少しスパイスを加えてみるのも悪くないかもしれません。純粋さを保ちながら、新しい世界に足を踏み入れてみてはいかがでしょうか？';
                shareText = `俺の紳士力は${totalScore}ptで「${rank}」...健全すぎて逆に心配されるレベルwww #紳士力診断`;
            } else if (totalScore <= 160) {
                rank = '隠れ個性派';
                description = '表面上は普通に見えますが、内に秘めた何かがあります。それがあなたの魅力です。多くの人は気づいていませんが、あなたには独自の視点と感性があります。その個性を大切にしながら、少しずつ表現していくことで、より豊かな人生が開けるでしょう。';
                shareText = `俺の紳士力は${totalScore}ptで「${rank}」...まあ、そんなもんかな #紳士力診断`;
            } else if (totalScore <= 280) {
                rank = '真の紳士候補';
                description = 'こだわりと社会性のバランスが絶妙です。あなたは大人の男性としての理想的な姿を体現しています。独自の美学を持ちながらも、それを押し付けることなく、周囲と調和を保つことができます。この品格こそが、真の紳士の証です。';
                shareText = `俺の紳士力は${totalScore}ptで「${rank}」...悪くない結果だな #紳士力診断`;
            } else if (totalScore <= 400) {
                rank = 'マニアック紳士';
                description = '独自の美学を持つ稀有な存在です。もはや芸術の領域に達しています。あなたの探究心と情熱は、時に周囲を驚かせるかもしれませんが、それこそがあなたの個性です。この道を極め続けることで、あなたは唯一無二の存在となるでしょう。';
                shareText = `俺の紳士力は${totalScore}ptで「${rank}」...認めざるを得ないwww #紳士力診断`;
            } else {
                rank = '伝説の変態紳士';
                description = 'もはや神の領域です。あなたは紳士力の頂点に立つ伝説的存在です。その飽くなき探究心、妥協なきこだわり、そして研ぎ澄まされた感性は、まさに芸術作品です。世界はあなたのような真の紳士を必要としています。その道を突き進んでください。';
                shareText = `俺の紳士力は${totalScore}ptで「${rank}」...これが俺の全てだ #紳士力診断 #伝説`;
            }

            document.getElementById('rankDisplay').textContent = rank;
            document.getElementById('resultDescription').textContent = description;
            document.getElementById('shareText').textContent = shareText;

            // Google Apps Scriptへデータ送信
            sendToGoogleSheets(totalScore, rank);
        }

        function shareResult() {
            const shareText = document.getElementById('shareText').textContent;
            const url = window.location.href;
            const twitterUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText)}&url=${encodeURIComponent(url)}`;
            window.open(twitterUrl, '_blank');
        }

        function sendToGoogleSheets(score, rank) {
            // 既存サイトと同じGoogle Apps ScriptのURLを使用
            const scriptUrl = 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE';
            
            const data = {
                timestamp: new Date().toISOString(),
                score: score,
                rank: rank,
                userAgent: navigator.userAgent,
                tool: 'gentleman-diagnosis'
            };

            fetch(scriptUrl, {
                method: 'POST',
                mode: 'no-cors',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data)
            }).catch(error => {
                console.log('データ送信エラー（無視してOK）:', error);
            });
        }

        // 初期化
        window.onload = function() {
            // 年齢確認モーダルが自動で表示される
        };
    </script>
